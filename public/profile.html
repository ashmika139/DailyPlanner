<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planner – My Profile</title>
    <meta name="description" content="Manage your Planner profile, goals, and lifestyle preferences." />
    <link rel="stylesheet" href="style.css" />
</head>

<body data-protected="true">

    <div id="auth-modal-container"></div>

    <nav class="navbar">
        <a href="index.html" class="navbar-logo">🗓️ <span>Planner</span></a>
        <ul class="navbar-nav" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="planners.html">Past Planners</a></li>
            <li><a href="connect.html">Connect</a></li>
            <li><a href="ai.html">AI Planner</a></li>
        </ul>
        <div class="navbar-right">
            <span class="nav-username" id="nav-username"></span>
            <button class="btn-logout" id="nav-logout">Logout</button>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="page-header">
        <h1>👤 My Profile</h1>
        <p>Customize your planner identity and goals</p>
    </div>

    <div class="profile-layout" id="profile-layout">
        <!-- Avatar -->
        <div class="card">
            <div class="card-header">Profile Picture</div>
            <div class="profile-avatar-section">
                <div class="avatar-wrap">
                    <img src="https://ui-avatars.com/api/?name=User&background=0A4FA3&color=fff&size=100" alt="Avatar"
                        class="avatar-img" id="avatar-preview" />
                    <button class="avatar-upload-btn" title="Change photo"
                        onclick="document.getElementById('avatar-input').click()">✏️</button>
                </div>
                <input type="file" id="avatar-input" accept="image/*" style="display:none" />
                <div>
                    <h2 id="profile-display-name" style="font-size:1.3rem;font-weight:700;color:var(--text-dark)">
                        Loading…</h2>
                    <p id="profile-lifestyle-label" style="font-size:0.88rem;color:var(--text-light);margin-top:4px">
                    </p>
                </div>
            </div>
        </div>

        <!-- Personal Info -->
        <div class="card">
            <div class="card-header">Personal Info</div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="profile-name" placeholder="Your full name" />
            </div>
            <div class="form-group">
                <label>Email (read-only)</label>
                <input type="email" id="profile-email" placeholder="email@example.com" disabled
                    style="background:#f5f7fa;color:#888" />
            </div>
            <div class="form-group">
                <label>Lifestyle Type</label>
                <select id="profile-lifestyle">
                    <option value="Student">Student</option>
                    <option value="Working Professional">Working Professional</option>
                    <option value="Freelancer">Freelancer</option>
                    <option value="Entrepreneur">Entrepreneur</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <!-- About -->
        <div class="card">
            <div class="card-header">About Me</div>
            <div class="form-group" style="margin-bottom:0">
                <textarea id="profile-about"
                    placeholder="Tell others about yourself – your interests, habits, or routines…"
                    style="min-height:110px;"></textarea>
            </div>
        </div>

        <!-- Goals -->
        <div class="card">
            <div class="card-header">🎯 My Goals</div>
            <div class="form-group" style="margin-bottom:0">
                <textarea id="profile-goals"
                    placeholder="What are your short and long-term goals? (e.g. finish degree, get fit, start a business…)"
                    style="min-height:110px;"></textarea>
            </div>
        </div>

        <!-- Save -->
        <div style="display:flex;gap:1rem">
            <button class="btn btn-primary btn-lg" id="save-profile-btn">💾 Save Profile</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('auth-modal-container').innerHTML = createAuthModalHTML();

        let currentAvatarFile = null;

        /* Avatar preview */
        document.getElementById('avatar-input').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            currentAvatarFile = file;
            const reader = new FileReader();
            reader.onload = ev => { document.getElementById('avatar-preview').src = ev.target.result; };
            reader.readAsDataURL(file);
        });

        async function loadProfile() {
            try {
                const user = await apiRequest('/api/profile');
                document.getElementById('profile-name').value = user.name || '';
                document.getElementById('profile-email').value = user.email || '';
                document.getElementById('profile-about').value = user.about || '';
                document.getElementById('profile-goals').value = user.goals || '';
                document.getElementById('profile-lifestyle').value = user.lifestyleType || 'Student';
                document.getElementById('profile-display-name').textContent = user.name;
                document.getElementById('profile-lifestyle-label').textContent = user.lifestyleType || '';

                if (user.profileImage) {
                    // profileImage is now a base64 data URL – use directly
                    document.getElementById('avatar-preview').src = user.profileImage;
                } else {
                    document.getElementById('avatar-preview').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=0A4FA3&color=fff&size=100`;
                }
            } catch (e) { showToast(e.message, 'error'); }
        }

        document.getElementById('save-profile-btn').addEventListener('click', async () => {
            const formData = new FormData();
            formData.append('name', document.getElementById('profile-name').value);
            formData.append('about', document.getElementById('profile-about').value);
            formData.append('goals', document.getElementById('profile-goals').value);
            formData.append('lifestyleType', document.getElementById('profile-lifestyle').value);
            if (currentAvatarFile) formData.append('profileImage', currentAvatarFile);

            try {
                const result = await apiRequest('/api/profile', 'PUT', formData, true);
                const u = result.user;
                // Update stored user with new name and profileImage
                const storedUser = getUser();
                if (storedUser) {
                    storedUser.name = u.name;
                    storedUser.profileImage = u.profileImage;
                    setUser(storedUser);
                }
                document.getElementById('profile-display-name').textContent = u.name;
                document.getElementById('profile-lifestyle-label').textContent = u.lifestyleType;
                document.getElementById('nav-username').textContent = u.name;
                if (u.profileImage) {
                    document.getElementById('avatar-preview').src = u.profileImage;
                }
                showToast('Profile updated! ✅', 'success');
                currentAvatarFile = null;
            } catch (e) { showToast(e.message, 'error'); }
        });

        function onAuthSuccess() { loadProfile(); }

        if (getToken()) loadProfile();
    </script>
</body>

</html>
