<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planner – Daily Plan</title>
  <meta name="description"
    content="AI-powered Daily Planner. Organize your day with schedules, priorities and to-do lists." />
  <link rel="stylesheet" href="style.css" />
</head>

<body data-protected="true">

  <!-- AUTH MODAL (injected by script) -->
  <div id="auth-modal-container"></div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">🗓️ <span>Planner</span></a>
    <ul class="navbar-nav" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="planners.html">Past Planners</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="connect.html">Connect</a></li>
      <li><a href="ai.html">AI Planner</a></li>
    </ul>
    <div class="navbar-right">
      <span class="nav-username" id="nav-username"></span>
      <button class="btn-logout" id="nav-logout">Logout</button>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- HERO / DATE -->
  <div class="planner-hero">
    <div class="planner-hero-top">
      <div>
        <h1>📋 Daily Plan</h1>
        <p style="opacity:0.8;font-size:0.9rem;margin-top:4px">Plan your day. Achieve your goals.</p>
      </div>
      <div class="date-input-wrapper">
        <span>📅</span>
        <input type="date" id="planner-date" />
      </div>
    </div>
  </div>

  <!-- PLANNER GRID -->
  <div class="planner-grid">

    <!-- LEFT COLUMN -->
    <div class="left-col" style="display:flex;flex-direction:column;gap:1.5rem;">

      <!-- SCHEDULE -->
      <div class="card" id="schedule-card">
        <div class="card-header">⏰ Today's Schedule</div>
        <div id="schedule-blocks">
          <!-- Generated by JS -->
        </div>
      </div>

      <!-- NOTES -->
      <div class="card">
        <div class="card-header">📝 Note</div>
        <div class="form-group" style="margin-bottom:0">
          <textarea id="planner-note" placeholder="Any notes, thoughts, or reminders for today…"
            style="min-height:130px;"></textarea>
        </div>
      </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="right-col" style="display:flex;flex-direction:column;gap:1.5rem;">

      <!-- TOP PRIORITIES -->
      <div class="card">
        <div class="card-header">🏆 Top Priorities</div>
        <div class="priority-item">
          <div class="priority-badge">1</div>
          <input type="text" id="priority-1" placeholder="Most important task today…" />
        </div>
        <div class="priority-item">
          <div class="priority-badge">2</div>
          <input type="text" id="priority-2" placeholder="Second priority…" />
        </div>
        <div class="priority-item">
          <div class="priority-badge">3</div>
          <input type="text" id="priority-3" placeholder="Third priority…" />
        </div>
      </div>

      <!-- TO DO LIST -->
      <div class="card">
        <div class="card-header">✅ To Do List</div>
        <div id="todo-list">
          <!-- Rendered by JS -->
        </div>
        <button class="add-todo-btn" id="add-todo-btn">+ Add Task</button>
      </div>

      <!-- FOR TOMORROW -->
      <div class="card">
        <div class="card-header">🌅 For Tomorrow</div>
        <div class="form-group" style="margin-bottom:0">
          <textarea id="planner-tomorrow" placeholder="What needs to be done tomorrow? Prep, reminders…"
            style="min-height:110px;"></textarea>
        </div>
      </div>

      <!-- SHARE TOGGLE -->
      <div class="card" style="padding:1rem 1.5rem;">
        <label
          style="display:flex;align-items:center;gap:0.6rem;cursor:pointer;text-transform:none;font-size:0.9rem;color:#4a5568;font-weight:500;letter-spacing:0;">
          <input type="checkbox" id="planner-shared" style="width:18px;height:18px;accent-color:#0A4FA3;" />
          Share this planner on the Connect feed
        </label>
      </div>

    </div>
  </div>

  <!-- ACTIONS -->
  <div class="planner-actions">
    <button class="btn btn-primary btn-lg" id="save-btn">💾 Save Planner</button>
    <button class="btn btn-secondary" id="load-today-btn">📂 Load Today's Plan</button>
    <button class="btn btn-outline" onclick="window.print()">🖨️ Print</button>
    <button class="btn btn-danger btn-sm" style="margin-left:auto" id="clear-btn">🗑️ Clear</button>
  </div>

  <script src="script.js"></script>
  <script>
    const TIME_SLOTS = [
      '5:00-6:00', '6:00-7:00', '7:00-8:00', '8:00-9:00', '9:00-10:00',
      '10:00-11:00', '11:00-12:00', '12:00-13:00', '13:00-14:00', '14:00-15:00',
      '15:00-16:00', '16:00-17:00', '17:00-18:00', '18:00-19:00', '19:00-20:00'
    ];

    /* Inject auth modal */
    document.getElementById('auth-modal-container').innerHTML = createAuthModalHTML();

    let todos = [{ text: '', done: false }, { text: '', done: false }, { text: '', done: false }];

    /* Set today's date */
    (function setDate() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      document.getElementById('planner-date').value = `${yyyy}-${mm}-${dd}`;
    })();

    /* Render schedule */
    function renderSchedule(data) {
      const container = document.getElementById('schedule-blocks');
      container.innerHTML = '';
      TIME_SLOTS.forEach((slot, i) => {
        const val = data && data[i] ? data[i].task : '';
        const div = document.createElement('div');
        div.className = 'schedule-block';
        div.innerHTML = `
          <span class="time-label">${slot}</span>
          <input type="text" data-slot="${i}" value="${val}" placeholder="What are you doing?" />
        `;
        container.appendChild(div);
      });
    }

    /* Render todos */
    function renderTodos() {
      const container = document.getElementById('todo-list');
      container.innerHTML = '';
      todos.forEach((todo, i) => {
        const div = document.createElement('div');
        div.className = `todo-item ${todo.done ? 'done' : ''}`;
        div.innerHTML = `
          <input type="checkbox" ${todo.done ? 'checked' : ''} data-index="${i}" />
          <input type="text" value="${todo.text}" placeholder="Task ${i + 1}…" data-todo="${i}" />
          <button class="todo-remove" data-remove="${i}" title="Remove">×</button>
        `;
        container.appendChild(div);
      });

      container.querySelectorAll('input[type=checkbox]').forEach(cb => {
        cb.addEventListener('change', e => {
          todos[e.target.dataset.index].done = e.target.checked;
          renderTodos();
        });
      });
      container.querySelectorAll('input[type=text]').forEach(inp => {
        inp.addEventListener('input', e => { todos[e.target.dataset.todo].text = e.target.value; });
      });
      container.querySelectorAll('.todo-remove').forEach(btn => {
        btn.addEventListener('click', e => {
          todos.splice(parseInt(e.target.dataset.remove), 1);
          renderTodos();
        });
      });
    }

    /* Collect planner data */
    function collectData() {
      const schedule = TIME_SLOTS.map((time, i) => ({
        time,
        task: document.querySelector(`input[data-slot="${i}"]`)?.value || ''
      }));
      const priorities = [
        document.getElementById('priority-1').value,
        document.getElementById('priority-2').value,
        document.getElementById('priority-3').value
      ].filter(Boolean);
      return {
        date: document.getElementById('planner-date').value,
        schedule,
        priorities,
        todos,
        note: document.getElementById('planner-note').value,
        tomorrow: document.getElementById('planner-tomorrow').value,
        shared: document.getElementById('planner-shared').checked
      };
    }

    /* Populate planner from data object */
    function populatePlanner(p) {
      document.getElementById('planner-date').value = p.date || '';
      renderSchedule(p.schedule);
      document.getElementById('priority-1').value = p.priorities?.[0] || '';
      document.getElementById('priority-2').value = p.priorities?.[1] || '';
      document.getElementById('priority-3').value = p.priorities?.[2] || '';
      todos = p.todos && p.todos.length ? p.todos : [{ text: '', done: false }];
      renderTodos();
      document.getElementById('planner-note').value = p.note || '';
      document.getElementById('planner-tomorrow').value = p.tomorrow || '';
      document.getElementById('planner-shared').checked = p.shared || false;
    }

    /* Init page */
    function onAuthSuccess() { initPage(); }

    async function initPage() {
      renderSchedule();
      renderTodos();

      // Check if AI plan was generated
      const aiPlan = localStorage.getItem('planner_ai_plan');
      if (aiPlan) {
        localStorage.removeItem('planner_ai_plan');
        populatePlanner(JSON.parse(aiPlan));
        showToast('AI plan loaded! Review and save.', 'success');
        return;
      }

      // Try to load today's planner automatically
      const today = document.getElementById('planner-date').value;
      await tryLoadDate(today);
    }

    async function tryLoadDate(date) {
      if (!getToken()) return;
      try {
        const planners = await apiRequest('/planner/all');
        const match = planners.find(p => p.date === date);
        if (match) {
          populatePlanner(match);
          showToast('Today\'s planner loaded.', 'info');
        }
      } catch (e) { /* silent */ }
    }

    /* Event listeners */
    document.getElementById('add-todo-btn').addEventListener('click', () => {
      todos.push({ text: '', done: false });
      renderTodos();
    });

    document.getElementById('save-btn').addEventListener('click', async () => {
      if (!getToken()) { openAuthModal(); return; }
      try {
        const data = collectData();
        if (!data.date) { showToast('Please select a date.', 'error'); return; }
        await apiRequest('/planner/create', 'POST', data);
        showToast('Planner saved! ✅', 'success');
      } catch (err) { showToast(err.message, 'error'); }
    });

    document.getElementById('load-today-btn').addEventListener('click', async () => {
      const date = document.getElementById('planner-date').value;
      if (!date) { showToast('Please select a date first.', 'error'); return; }
      await tryLoadDate(date);
    });

    document.getElementById('planner-date').addEventListener('change', async e => {
      await tryLoadDate(e.target.value);
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      if (!confirm('Clear all fields?')) return;
      renderSchedule();
      document.getElementById('priority-1').value = '';
      document.getElementById('priority-2').value = '';
      document.getElementById('priority-3').value = '';
      todos = [{ text: '', done: false }];
      renderTodos();
      document.getElementById('planner-note').value = '';
      document.getElementById('planner-tomorrow').value = '';
    });

    if (getToken()) initPage();
  </script>
</body>

</html>
